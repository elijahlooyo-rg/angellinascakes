<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us — Angellina Cakes</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="shortcut icon" href="images/logo.jpeg" type="image/x-icon" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
</head>
<body>
  <header>
    <h1><span>ANGELLINA</span> CAKES</h1>
    <p>Where there's cake, there's hope!</p>
  </header>

  <nav>
    <img src="images/logo.jpeg" class="logo" width="70px" height="70px" />
    <ul id="nav-list">
      <li><a href="index.html">Home</a></li>
      <li><a href="menu.html">Menu</a></li>
      <li><a href="services.html">Services</a></li>
      <li><a href="contactus.html">Contact Us</a></li>
      <li><a href="cart.html">Cart</a></li>
    </ul>
    <div class="humbger" id="humbger">
      <div class="humbger-line"></div>
      <div class="humbger-line"></div>
      <div class="humbger-line"></div>
    </div>
    <a class="cart" href="cart.html">
      <i class="bi bi-cart"></i>
      <span class="cart-count">0</span>
    </a>
  </nav>

  <main>
    <section class="contacts">
      <h2>Contact Us</h2>
      <p>Have questions or want to place an order? Reach out to us!</p>
      <form action="" class="contact-form">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <label for="whatsapp">Whatsapp</label>
        <input type="text" name="tel" id="whatsapp-contact" maxlength="13" placeholder="+256.....">
        <label for="message">Message:</label>
        <textarea id="message" name="message" required></textarea>
        <button type="submit">Send Message</button>
      </form>
    </section>
    <section class="location">
      <h2>Visit Our Store</h2>
      <p>Find us at:</p>
      <address>
        123 Bakery Street<br>
        Ndeeba, Kampala
      </address>
      <iframe src="https://www.google.com/maps/embed?pb=!1m16!1m12!1d63836.17049976654!2d32.59382734236432!3d0.3080451542137086!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sndeeba%20church!5e0!3m2!1sen!2sug!4v1773415809172!5m2!1sen!2sug" width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Angelicas Cakes. All rights reserved.</p>
  </footer>

  <a href="https://wa.me/256757511917?text=Hello%20from%20Angellina%20Cakes" target="_blank" class="whatsapp-btn">
    <i class="bi bi-whatsapp"></i>
  </a>

  <script src="script.js"></script>

  <script>
    document.querySelector('.contact-form').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const name = document.getElementById('name').value;
      const email = document.getElementById('email').value;
      const whatsapp = document.getElementById('whatsapp-contact').value;
      const message = document.getElementById('message').value;
      
      const whatsappMessage = `Hello from Angellina Cakes Contact Form\n\nName: ${name}\nEmail: ${email}\nWhatsApp: ${whatsapp}\nMessage: ${message}`;
      
      const whatsappUrl = `https://wa.me/256757511917?text=${encodeURIComponent(whatsappMessage)}`;
      
      window.open(whatsappUrl, '_blank');
    });
  </script>
</body>
</html>
